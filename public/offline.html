<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ea580c" />
    <title>Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Arial, sans-serif;
        background: linear-gradient(180deg, #fff, #fff7ed);
        color: #3f3f46;
      }
      .card {
        width: min(92vw, 420px);
        border: 1px solid #fed7aa;
        border-radius: 20px;
        background: #fff;
        padding: 24px;
        text-align: center;
      }
      h1 {
        margin: 0 0 8px;
        color: #ea580c;
      }
      p {
        margin: 0;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>You are offline</h1>
      <p>Please reconnect to continue using the store.</p>
    </div>
  </body>
</html>
